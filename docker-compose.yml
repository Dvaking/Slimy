services:
  database:
    image: postgres:latest
    container_name: slimy-database
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - slimy_postgre_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "db_prod"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s

  backend:
    container_name: slimy-backend
    restart: always
    environment:
      PORT: ${PORT}
      DATABASE_URL: ${DATABASE_URL}
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 80s
    volumes:
      - ./backend/src:/backend/src
      - /var/run/docker.sock:/var/run/docker.sock

  bot:
    container_name: slimy-bot
    restart: always
    environment:
      DEVTOKEN: ${DEVTOKEN}
      BACKEND_URL: ${BACKEND_URL}
    build:
      context: ./bot
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./bot/src:/bot/src
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["npm", "run", "dev"]

volumes:
  slimy_postgre_data:
