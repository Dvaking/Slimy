services:
  slimy-database:
   image: postgres:latest
   container_name: slimy-database
   restart: always
   environment:
     POSTGRES_USER: ${POSTGRES_USER}
     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
     POSTGRES_DB: ${POSTGRES_DB}
   ports:
      - "5432:5432"
   volumes:
     - slimy_postgre_data:/var/lib/postgresql/data

volumes:
  slimy_postgre_data:
